name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: '.fvmrc'
          cache: true

      - name: Configure Keystore and Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is not set or is empty."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > android/app/upload-keystore.jks
          
          FILE_SIZE=$(wc -c < android/app/upload-keystore.jks)
          echo "Decoded keystore size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -eq 0 ]; then
            echo "Error: Decoded keystore file is empty."
            exit 1
          fi
          
          if ! keytool -list -keystore android/app/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null; then
            echo "Error: Keystore validation failed. Please check if the passwords or key alias are correct, or if the base64 secret is corrupted."
            exit 1
          fi
          
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-token: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Create Dummy .env
        run: touch .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Shorebird Android Release
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version:[[:space:]]*//g')
          echo "Building Shorebird release for version $VERSION..."
          
          # Attempt to build and register the release with Shorebird.
          # If it already exists (because it was published locally via release.sh), 
          # we catch the error, verify it's the "already exists" error, and download the APKs instead.
          set +e
          BUILD_OUTPUT=$(shorebird release android --artifact apk --yes 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$BUILD_OUTPUT"
          
          mkdir -p build/app/outputs/flutter-apk
          
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$BUILD_OUTPUT" | grep -q -i "already exists"; then
              echo "Release $VERSION already exists on Shorebird. Fetching existing APKs..."
              shorebird releases get-apks --release-version "$VERSION" --out build/app/outputs/flutter-apk/
              
              # Find the generated APK and move it to the expected release path
              if [ -f "build/app/outputs/flutter-apk/universal.apk" ]; then
                mv build/app/outputs/flutter-apk/universal.apk build/app/outputs/flutter-apk/app-release.apk
              elif [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
                echo "APK already at expected location."
              else
                echo "Looking for any built APK..."
                find build/app/outputs/flutter-apk/ -name "*.apk" -exec mv {} build/app/outputs/flutter-apk/app-release.apk \;
              fi
            else
              echo "Error: Shorebird build failed with compilation or configuration error."
              exit $EXIT_CODE
            fi
          else
            echo "Shorebird release registered and built successfully."
            # Copy/move the built APK to the folder expected by the release step
            if [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
              cp build/app/outputs/apk/release/app-release.apk build/app/outputs/flutter-apk/app-release.apk
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
