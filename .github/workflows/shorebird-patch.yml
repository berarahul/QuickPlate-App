name: Shorebird Patch

on:
  workflow_dispatch:
    inputs:
      args:
        description: 'Extra arguments to pass to shorebird patch (e.g. --target-flavor dev)'
        required: false
        default: ''

jobs:
  shorebird_patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: '.fvmrc'
          cache: true

      - name: Configure Keystore and Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is not set or is empty."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > android/app/upload-keystore.jks
          
          FILE_SIZE=$(wc -c < android/app/upload-keystore.jks)
          echo "Decoded keystore size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -eq 0 ]; then
            echo "Error: Decoded keystore file is empty."
            exit 1
          fi
          
          if ! keytool -list -keystore android/app/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null; then
            echo "Error: Keystore validation failed. Please check if the passwords or key alias are correct, or if the base64 secret is corrupted."
            exit 1
          fi
          
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-token: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Create Dummy .env
        run: touch .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build and Publish Shorebird Patch
        run: shorebird patch android --yes ${{ github.event.inputs.args }}
